<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectHub QMS</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', Sarabun, sans-serif; }
  .tab-active { background:rgba(6,182,212,.15); color:#22d3ee; border-color:rgba(6,182,212,.35); }
  .fade { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">

<!-- NAV -->

<nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-slate-700/50">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center text-base">🔗</div>
      <span class="font-bold text-white hidden sm:inline">ConnectHub <span class="text-cyan-400 text-xs font-normal">QMS</span></span>
    </div>
    <div class="flex gap-1" id="mainNav"></div>
    <div class="flex items-center gap-2">
      <div id="userBadge" class="hidden sm:block text-right"></div>
      <div id="userAvatar" class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold"></div>
    </div>
  </div>
</nav>

<!-- MAIN -->

<div id="app" class="max-w-7xl mx-auto px-4 py-6"></div>

<!-- MODAL -->

<div id="modal" class="fixed inset-0 z-50 hidden bg-black/60 flex items-center justify-center p-4">
  <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between p-5 border-b border-slate-700">
      <h3 id="modalTitle" class="font-bold text-white text-lg"></h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl leading-none">✕</button>
    </div>
    <div id="modalBody" class="p-5"></div>
  </div>
</div>

<!-- TOAST -->

<div id="toast" class="fixed bottom-5 right-5 z-50 hidden">
  <div id="toastMsg" class="bg-slate-800 border border-slate-600 text-white px-4 py-3 rounded-xl shadow-xl text-sm"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const STATE = {
  tab:  'home',
  dept: null,
  deptTab: null,
  user: { name: '', email: '', initials: '' },
  cache: {},
};

const DEPTS = [
  { id:'hr', name:'ทรัพยากรบุคคล', abbr:'ทรม.',   icon:'👥', grad:'from-blue-500 to-cyan-500',    desc:'Human Resources' },
  { id:'ac', name:'บัญชี',          abbr:'บัญชี',  icon:'🧮', grad:'from-green-500 to-emerald-500', desc:'Accounting' },
  { id:'sa', name:'ขาย',            abbr:'ขาย',    icon:'📈', grad:'from-orange-500 to-red-500',    desc:'Sales' },
  { id:'pu', name:'จัดซื้อ',        abbr:'จ.ซื้อ', icon:'🛒', grad:'from-purple-500 to-pink-500',   desc:'Purchasing' },
  { id:'pd', name:'การผลิต',        abbr:'ผลิต',   icon:'🏭', grad:'from-yellow-500 to-orange-500', desc:'Production' },
  { id:'qa', name:'ควบคุมคุณภาพ',  abbr:'QA/QC',  icon:'✅', grad:'from-indigo-500 to-blue-500',  desc:'Quality Control' },
  { id:'wh', name:'คลังสินค้า',    abbr:'คลัง',   icon:'🏪', grad:'from-slate-500 to-gray-600',    desc:'Warehouse' },
  { id:'mn', name:'ซ่อมบำรุง',     abbr:'ซบ.',    icon:'🔧', grad:'from-amber-500 to-orange-600',  desc:'Maintenance' },
];

const DEPT_TABS = {
  hr: [{id:'training',l:'อบรม',ic:'🎓'},{id:'employees',l:'พนักงาน',ic:'👤'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
  ac: [{id:'budget',l:'งบประมาณ',ic:'💰'},{id:'approvals',l:'อนุมัติ',ic:'📋'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
  sa: [{id:'targets',l:'เป้าขาย',ic:'📊'},{id:'orders',l:'Sales Order',ic:'📦'},{id:'complaints',l:'ร้องเรียน',ic:'📝'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
  pu: [{id:'suppliers',l:'Supplier',ic:'🏭'},{id:'po',l:'ใบสั่งซื้อ',ic:'📋'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
  pd: [{id:'lines',l:'ไลน์ผลิต',ic:'🏭'},{id:'daily',l:'บันทึกผลิต',ic:'📊'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
  qa: [{id:'inspection',l:'ผลตรวจ',ic:'🔍'},{id:'calibration',l:'เครื่องมือวัด',ic:'⚖️'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
  wh: [{id:'inventory',l:'สต็อก',ic:'📦'},{id:'movements',l:'รับ-จ่าย',ic:'↕️'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
  mn: [{id:'workorders',l:'ใบงานซ่อม',ic:'📋'},{id:'pm',l:'แผน PM',ic:'🗓️'},{id:'request',l:'แจ้งซ่อม',ic:'🛠️'},{id:'ncr',l:'NCR',ic:'⚠️'},{id:'capa',l:'CAPA',ic:'🔧'},{id:'docs',l:'เอกสาร',ic:'📄'},{id:'kpi',l:'KPI',ic:'📊'},{id:'audit',l:'Audit',ic:'🔍'}],
};

const SB = s => ({'pass':'bg-emerald-500/20 text-emerald-300','fail':'bg-red-500/20 text-red-300','ปกติ':'bg-emerald-500/20 text-emerald-300','มีผลบังคับใช้':'bg-emerald-500/20 text-emerald-300','ทบทวนใหม่':'bg-yellow-500/20 text-yellow-300','ปิดแล้ว':'bg-emerald-500/20 text-emerald-300','เสร็จสิ้น':'bg-emerald-500/20 text-emerald-300','เสร็จแล้ว':'bg-emerald-500/20 text-emerald-300','อยู่ระหว่างดำเนินการ':'bg-yellow-500/20 text-yellow-300','กำลังดำเนินการ':'bg-cyan-500/20 text-cyan-300','รอดำเนินการ':'bg-slate-500/20 text-slate-300','รออนุมัติ':'bg-yellow-500/20 text-yellow-300','อนุมัติแล้ว':'bg-emerald-500/20 text-emerald-300','Major':'bg-red-500/20 text-red-300','Minor':'bg-yellow-500/20 text-yellow-300','เกินกำหนด':'bg-red-500/20 text-red-300','ใกล้กำหนด':'bg-yellow-500/20 text-yellow-300','หมดอายุแล้ว':'bg-red-500/20 text-red-300','ใกล้หมดอายุ':'bg-yellow-500/20 text-yellow-300','Approved':'bg-emerald-500/20 text-emerald-300','Conditional':'bg-yellow-500/20 text-yellow-300','ผ่าน':'bg-emerald-500/20 text-emerald-300','ผ่านมีข้อสังเกต':'bg-yellow-500/20 text-yellow-300','ไม่ผ่าน':'bg-red-500/20 text-red-300','รับเรื่องแล้ว':'bg-cyan-500/20 text-cyan-300'}[s]||'bg-slate-500/20 text-slate-300');
const DCB = {hr:'bg-blue-500/20 text-blue-300',ac:'bg-emerald-500/20 text-emerald-300',sa:'bg-orange-500/20 text-orange-300',pu:'bg-purple-500/20 text-purple-300',pd:'bg-yellow-500/20 text-yellow-300',qa:'bg-indigo-500/20 text-indigo-300',wh:'bg-slate-500/20 text-slate-300',mn:'bg-amber-500/20 text-amber-300'};

// ═══════════════════════════════════════════════════════════════
// SERVER CALL
// ═══════════════════════════════════════════════════════════════
function api(action, payload) {
  return new Promise((res, rej) => {
    google.script.run
      .withSuccessHandler(r => { if (r && r.error) rej(r.error); else res(r); })
      .withFailureHandler(e => rej(e.message || e))
      .callServer(action, payload || {});
  });
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const app = () => $('app');

function loading(msg) {
  app().innerHTML = `<div class="flex flex-col items-center justify-center py-24 gap-3">
    <div class="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full spin"></div>
    <p class="text-slate-400 text-sm">${msg||'กำลังโหลด...'}</p></div>`;
}

function empty(msg, sub) {
  return `<div class="text-center py-12 bg-slate-800/40 border border-slate-700 rounded-xl">
    <p class="text-3xl mb-2">📭</p>
    <p class="text-slate-300 font-semibold">${msg||'ไม่มีข้อมูล'}</p>
    ${sub?`<p class="text-slate-500 text-sm mt-1">${sub}</p>`:''}
  </div>`;
}

function badge(s) { return `<span class="text-xs px-2 py-0.5 rounded-full ${SB(s)}">${s}</span>`; }

function toast(msg, ok=true) {
  const t=$('toast'), m=$('toastMsg');
  m.textContent = msg;
  m.className = `px-4 py-3 rounded-xl shadow-xl text-sm border ${ok?'bg-emerald-900/80 border-emerald-600 text-emerald-200':'bg-red-900/80 border-red-600 text-red-200'}`;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'), 3000);
}

function openModal(title, bodyHtml) {
  $('modalTitle').textContent = title;
  $('modalBody').innerHTML = bodyHtml;
  $('modal').classList.remove('hidden');
}
function closeModal() { $('modal').classList.add('hidden'); }

function card(content, extra='') {
  return `<div class="bg-slate-800/50 border border-slate-700 rounded-xl p-4 ${extra}">${content}</div>`;
}

// ═══════════════════════════════════════════════════════════════
// NAV RENDER
// ═══════════════════════════════════════════════════════════════
function renderNav() {
  const tabs = [['home','🏠','หน้าแรก'],['departments','📂','แผนก'],['announcements','📢','ประกาศ'],['events','🎉','กิจกรรม']];
  $('mainNav').innerHTML = tabs.map(([t,ic,lb]) =>
    `<button onclick="goTab('${t}')" class="px-2 sm:px-3 py-1.5 rounded-lg text-sm font-medium border transition ${STATE.tab===t?'tab-active border-transparent':'text-slate-300 border-transparent hover:text-white'}">
      <span class="sm:hidden">${ic}</span><span class="hidden sm:inline">${lb}</span>
    </button>`
  ).join('');
  const u = STATE.user;
  if (u.name) {
    $('userBadge').innerHTML = `<p class="text-xs text-white font-semibold leading-none">${u.name}</p><p class="text-xs text-slate-500 leading-none mt-0.5">${u.email}</p>`;
    $('userAvatar').textContent = u.initials;
  }
}

function goTab(t) { STATE.tab=t; STATE.dept=null; renderNav(); renderPage(); }
function goDept(id) { STATE.dept=id; STATE.deptTab=DEPT_TABS[id][0].id; STATE.tab='departments'; renderNav(); renderPage(); }

// ═══════════════════════════════════════════════════════════════
// RENDER PAGE ROUTER
// ═══════════════════════════════════════════════════════════════
async function renderPage() {
  if (STATE.tab==='home')          return renderHome();
  if (STATE.tab==='announcements') return renderAnnouncements();
  if (STATE.tab==='events')        return renderEvents();
  if (STATE.tab==='departments') {
    if (STATE.dept) return renderDeptPage();
    return renderDeptList();
  }
}

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
async function renderHome() {
  loading('โหลดภาพรวมองค์กร...');
  const dash = await api('getDashboard');
  const html = `<div class="space-y-8 fade">
    <div class="text-center py-6">
      <h1 class="text-4xl font-bold mb-2" style="background:linear-gradient(to right,#06b6d4,#60a5fa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ConnectHub QMS</h1>
      <p class="text-slate-400">ระบบบริหารคุณภาพองค์กร — ISO 9001:2015</p>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
      ${[['⚠️','NCR ทั้งหมด',dash.totalNcr],['🔴','NCR ค้างอยู่',dash.openNcr],['🔧','CAPA ทั้งหมด',dash.totalCapa],['📢','ประกาศ',dash.totalAnns]].map(([ic,lb,val])=>`
      <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-5">
        <div class="text-2xl mb-2">${ic}</div>
        <p class="text-slate-400 text-xs mb-1">${lb}</p>
        <p class="text-3xl font-bold text-white">${val||0}</p>
      </div>`).join('')}
    </div>
    <div>
      <h2 class="text-lg font-bold text-white mb-4">เข้าถึงแผนก</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        ${DEPTS.map(d=>`
        <button onclick="goDept('${d.id}')" class="bg-gradient-to-br ${d.grad} rounded-xl p-4 text-white text-left hover:-translate-y-1 hover:shadow-xl transition-all duration-200">
          <span class="text-2xl block mb-2">${d.icon}</span>
          <p class="font-bold text-sm">${d.name}</p>
          <p class="text-white/60 text-xs">${d.abbr}</p>
        </button>`).join('')}
      </div>
    </div>
    ${dash.recentNcr && dash.recentNcr.length ? `
    <div>
      <h2 class="text-lg font-bold text-white mb-4">NCR ล่าสุด</h2>
      <div class="space-y-2">
        ${dash.recentNcr.map(n=>{const d=DEPTS.find(x=>x.id===n.dept)||{};return `
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-4 flex items-center justify-between">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span class="text-cyan-400 font-mono text-xs">${n.no}</span>
              <span class="text-xs px-1.5 py-0.5 rounded-full ${DCB[n.dept]||''}">${d.icon||''} ${d.abbr||n.dept}</span>
              ${badge(n.severity)}
            </div>
            <p class="text-slate-200 text-sm">${n.issue}</p>
            <p class="text-slate-500 text-xs mt-0.5">เปิด ${n.opened}</p>
          </div>
          ${badge(n.status)}
        </div>`;}).join('')}
      </div>
    </div>` : ''}
  </div>`;
  app().innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// DEPT LIST
// ═══════════════════════════════════════════════════════════════
function renderDeptList() {
  app().innerHTML = `<div class="fade">
    <h1 class="text-3xl font-bold text-white mb-2">เลือกแผนก</h1>
    <p class="text-slate-400 mb-8">แต่ละแผนกมีระบบ QMS และฟีเจอร์เฉพาะของตัวเอง</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
      ${DEPTS.map(d=>`
      <button onclick="goDept('${d.id}')" class="bg-gradient-to-br ${d.grad} rounded-2xl p-6 text-white text-left relative overflow-hidden hover:-translate-y-2 hover:shadow-2xl transition-all duration-300">
        <div class="absolute -top-6 -right-6 w-24 h-24 bg-white/10 rounded-full"></div>
        <div class="relative z-10">
          <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-2xl mb-4">${d.icon}</div>
          <h3 class="font-bold mb-1">${d.name}</h3>
          <p class="text-white/70 text-xs mb-3">${d.desc}</p>
          <div class="flex flex-col gap-0.5 text-xs text-white/80">
            ${(DEPT_TABS[d.id]||[]).slice(0,3).map(t=>`<span>· ${t.l}</span>`).join('')}
          </div>
        </div>
      </button>`).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// DEPT PAGE
// ═══════════════════════════════════════════════════════════════
async function renderDeptPage() {
  const d = DEPTS.find(x=>x.id===STATE.dept);
  if (!d) return;
  const tabs = DEPT_TABS[d.id]||[];
  const tabBar = tabs.map(t=>`
    <button onclick="setDeptTab('${t.id}')" class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium whitespace-nowrap border transition ${STATE.deptTab===t.id?'tab-active':'text-slate-400 border-transparent hover:text-white hover:bg-slate-700/50'}">
      ${t.ic} ${t.l}
    </button>`).join('');
  app().innerHTML = `<div class="fade flex flex-col" style="min-height:80vh">
    <div class="bg-gradient-to-r ${d.grad} rounded-2xl px-6 py-5 mb-0">
      <button onclick="goTab('departments')" class="text-white/70 hover:text-white text-sm mb-3 flex items-center gap-1">← กลับ</button>
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-3xl">${d.icon}</div>
        <div><h1 class="text-2xl font-bold text-white">${d.name}</h1><p class="text-white/70 text-sm">${d.desc}</p></div>
      </div>
    </div>
    <div class="flex gap-1 py-3 overflow-x-auto flex-shrink-0 bg-slate-800/60 border-b border-slate-700 px-2 rounded-b-xl mb-4">${tabBar}</div>
    <div id="deptContent" class="flex-1"></div>
  </div>`;
  await loadDeptTab();
}

function setDeptTab(t) { STATE.deptTab=t; renderNav(); loadDeptTab(); }

async function loadDeptTab() {
  const cont = $('deptContent');
  if (!cont) return;
  cont.innerHTML = `<div class="flex items-center justify-center py-12"><div class="w-7 h-7 border-2 border-cyan-500 border-t-transparent rounded-full spin"></div></div>`;
  const t = STATE.deptTab, dept = STATE.dept;
  try {
    // QMS shared tabs
    if (t==='ncr')   return renderNCR(cont, dept);
    if (t==='capa')  return renderCAPA(cont, dept);
    if (t==='docs')  return renderDocs(cont, dept);
    if (t==='kpi')   return renderKPI(cont, dept);
    if (t==='audit') return renderAudit(cont, dept);
    // Dept-specific tabs
    if (dept==='hr') {
      if (t==='training')  return renderTraining(cont);
      if (t==='employees') return renderEmployees(cont);
    }
    if (dept==='ac') {
      if (t==='budget')    return renderBudget(cont);
      if (t==='approvals') return renderApprovals(cont);
    }
    if (dept==='sa') {
      if (t==='targets')    return renderSalesTargets(cont);
      if (t==='orders')     return renderSalesOrders(cont);
      if (t==='complaints') return renderComplaints(cont);
    }
    if (dept==='pu') {
      if (t==='suppliers') return renderSuppliers(cont);
      if (t==='po')        return renderPO(cont);
    }
    if (dept==='pd') {
      if (t==='lines')  return renderLines(cont);
      if (t==='daily')  return renderDailyProd(cont);
    }
    if (dept==='qa') {
      if (t==='inspection')  return renderInspection(cont);
      if (t==='calibration') return renderCalibration(cont);
    }
    if (dept==='wh') {
      if (t==='inventory')  return renderInventory(cont);
      if (t==='movements')  return renderMovements(cont);
    }
    if (dept==='mn') {
      if (t==='workorders') return renderWorkOrders(cont);
      if (t==='pm')         return renderPM(cont);
      if (t==='request')    return renderWOForm(cont);
    }
  } catch(e) { cont.innerHTML = `<p class="text-red-400 text-sm p-4">เกิดข้อผิดพลาด: ${e}</p>`; }
}

// ═══════════════════════════════════════════════════════════════
// SHARED QMS TABS
// ═══════════════════════════════════════════════════════════════
async function renderNCR(cont, dept) {
  const data = await api('getNCR', {dept});
  cont.innerHTML = `<div class="fade">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-white">Non-Conformance Report</h3>
      <button onclick="showAddNCR('${dept}')" class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs px-3 py-1.5 rounded-lg transition">+ เพิ่ม NCR</button>
    </div>

</div>

</div>

  </div>`;
}

function selectPriority(lv, btn) {
$(‘wo_priority’).value=lv;
const cls={ฉุกเฉิน:‘bg-slate-700 border-red-500 text-red-300’,สูง:‘bg-slate-700 border-orange-500 text-orange-300’,ปกติ:‘bg-slate-700 border-yellow-500 text-yellow-300’,ต่ำ:‘bg-slate-700 border-slate-500 text-slate-300’};
document.querySelectorAll(’[data-level]’).forEach(b=>{
b.className=`flex-1 py-2 rounded-lg border text-xs font-semibold transition ${b.dataset.level===lv?cls[lv]:'border-slate-600 text-slate-400'}`;

async function doSubmitWO() {
const t=$(‘wo_title’).value.trim(), l=$(‘wo_location’).value.trim(), d=$(‘wo_desc’).value.trim();
if(!t||!l||!d) return toast(‘กรุณากรอกข้อมูลที่จำเป็น’,false);
await api(‘addWorkOrder’,{data:{machine:$(‘wo_machine’).value||’-’,location:l,issue:t+’ — ’+d,priority:$(‘wo_priority’).value,imageUrls:$(‘wo_link’).value}});
toast(‘ส่งใบงานซ่อมสำเร็จ ✅’);
renderWOForm($(‘deptContent’));
}

async function renderAnnouncements() {
loading(‘โหลดประกาศ…’);
const data = await api(‘getAnnouncements’,{});
const sorted = data.slice().reverse();
app().innerHTML = `<div class="fade"> <div class="flex items-center justify-between mb-6"> <div><h1 class="text-3xl font-bold text-white mb-1">📢 ประกาศและชี้แจง</h1> <p class="text-slate-400">ข่าวสารจากทุกแผนก</p></div> <button onclick="showAddAnn()" class="bg-cyan-600 hover:bg-cyan-500 text-white text-sm px-4 py-2 rounded-xl transition">+ ประกาศใหม่</button> </div> ${sorted.length ? sorted.map(a=>{ const d=DEPTS.find(x=>x.id===a.dept)||{}; const isUrgent=a.urgent==='TRUE'||a.urgent===true; const isPinned=a.pinned==='TRUE'||a.pinned===true; return `<div class="bg-slate-800/50 border ${isUrgent?'border-red-500/30':'border-slate-700'} rounded-xl overflow-hidden mb-3 cursor-pointer hover:border-slate-600 transition" onclick="toggleAnn(this)">
<div class="h-1 bg-gradient-to-r ${d.grad||'from-slate-500 to-slate-600'}"></div>
<div class="p-5">
<div class="flex items-start justify-between gap-3">
<div class="flex-1">
<div class="flex flex-wrap items-center gap-2 mb-2">
${isPinned?’<span>📌</span>’:’’}
<span class="text-xs font-bold px-2 py-0.5 rounded-full ${DCB[a.dept]||''}">${d.icon||’’} ${d.abbr||a.dept}</span>
${isUrgent?’<span class="text-xs px-2 py-0.5 rounded-full bg-red-500/20 text-red-300">⚡ เร่งด่วน</span>’:’’}
<span class="text-xs text-slate-500">${a.postedDate} · โดย ${a.postedBy||’—’}</span>
</div>
<h3 class="font-semibold text-white">${a.title}</h3>
<p class="ann-body text-slate-400 text-sm mt-1 truncate">${a.body}</p>
</div>
<span class="ann-arrow text-slate-500 flex-shrink-0">▼</span>
</div>
</div>
</div>`;}).join('') : `<div class="text-center py-16 text-slate-500"><p class="text-4xl mb-3">📭</p><p>ยังไม่มีประกาศ</p></div>`}

  </div>`;
}

function toggleAnn(el) {
const body=el.querySelector(’.ann-body’);
const arrow=el.querySelector(’.ann-arrow’);
const isExpanded=!body.classList.contains(‘truncate’);
if(isExpanded){body.classList.add(‘truncate’);arrow.textContent=‘▼’;}
else{body.classList.remove(‘truncate’);arrow.textContent=‘▲’;}
}

function showAddAnn() {
openModal(‘โพสต์ประกาศใหม่’,` <div class="space-y-3"> <div><label class="text-xs text-slate-400 mb-1 block">แผนก</label> <select id="f_dept" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"> ${DEPTS.map(d=>`<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')} </select></div> <div><label class="text-xs text-slate-400 mb-1 block">หัวข้อ *</label> <input id="f_title" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div> <div><label class="text-xs text-slate-400 mb-1 block">รายละเอียด *</label> <textarea id="f_body" rows="4" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none resize-none"></textarea></div> <div><label class="text-xs text-slate-400 mb-1 block">ผู้โพสต์</label> <input id="f_by" value="${STATE.user.name||''}" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div> <div class="flex gap-4"> <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer"> <input type="checkbox" id="f_urgent" class="rounded"> ⚡ เร่งด่วน </label> <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer"> <input type="checkbox" id="f_pinned" class="rounded"> 📌 ปักหมุด </label> </div> <button onclick="doAddAnn()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-2.5 rounded-xl text-sm font-semibold transition">โพสต์ประกาศ</button> </div>`);
}

async function doAddAnn() {
const t=$(‘f_title’).value.trim(), b=$(‘f_body’).value.trim();
if(!t||!b) return toast(‘กรุณากรอกหัวข้อและรายละเอียด’,false);
await api(‘addAnnouncement’,{data:{dept:$(‘f_dept’).value,title:t,body:b,postedBy:$(‘f_by’).value,urgent:$(‘f_urgent’).checked?‘TRUE’:‘FALSE’,pinned:$(‘f_pinned’).checked?‘TRUE’:‘FALSE’}});

}

<div class="h-1 bg-gradient-to-r ${d.grad||'from-slate-500 to-slate-600'}"></div>
<div class="p-5 flex items-start gap-4">

function showAddEvent() {
openModal(‘เพิ่มกิจกรรม’,` <div class="space-y-3"> <div><label class="text-xs text-slate-400 mb-1 block">ชื่อกิจกรรม *</label> <input id="f_title" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div> <div class="grid grid-cols-2 gap-3"> <div><label class="text-xs text-slate-400 mb-1 block">แผนก</label> <select id="f_dept" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"> ${DEPTS.map(d=>`<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')} </select></div> <div><label class="text-xs text-slate-400 mb-1 block">ประเภท</label> <select id="f_type" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"> <option>Internal</option><option>External</option><option>Management</option><option>Training</option><option>PM</option><option>อื่นๆ</option> </select></div> </div> <div class="grid grid-cols-2 gap-3"> <div><label class="text-xs text-slate-400 mb-1 block">วันที่</label> <input type="date" id="f_date" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div> <div><label class="text-xs text-slate-400 mb-1 block">เวลา</label> <input id="f_time" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none" placeholder="09:00–12:00 น."/></div> </div> <div><label class="text-xs text-slate-400 mb-1 block">ผู้รับผิดชอบ</label> <input id="f_by" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div> <div><label class="text-xs text-slate-400 mb-1 block">หมายเหตุ</label> <input id="f_note" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div> <button onclick="doAddEvent()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-2.5 rounded-xl text-sm font-semibold transition">บันทึก</button> </div>`);
}

async function doAddEvent() {
const t=$(‘f_title’).value.trim();
if(!t) return toast(‘กรุณากรอกชื่อกิจกรรม’,false);
const d=$(‘f_date’).value?$(‘f_date’).value.split(’-’).reverse().join(’/’):’’;
await api(‘addEvent’,{data:{title:t,dept:$(‘f_dept’).value,date:d,time:$(‘f_time’).value,type:$(‘f_type’).value,by:$(‘f_by’).value,note:$(‘f_note’).value}});
closeModal(); toast(‘เพิ่มกิจกรรมสำเร็จ’);
renderEvents();
}

async function delEvent(id) {
if(!confirm(‘ยืนยันลบกิจกรรมนี้?’)) return;
await api(‘deleteEvent’,{id}); toast(‘ลบแล้ว’);
renderEvents();
}

.withFailureHandler(function() {
